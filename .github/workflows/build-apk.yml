name: Build Installable APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Test and build QQAntiRevoke NT APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Run tests and build signed debug APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace clean :app:testDebugUnitTest :app:assembleDebug

      - name: Prepare artifact
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="app/build/outputs/apk/debug/app-debug.apk"
          NAME="QQAntiRevoke-NT-v3.3.0-QQ9.2.10-debug.apk"
          test -f "$SOURCE"
          mkdir -p dist
          cp "$SOURCE" "dist/$NAME"
          SHA256="$(sha256sum "dist/$NAME" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$NAME" > dist/SHA256SUMS.txt
          echo "apk_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "apk_sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: QQAntiRevoke-NT-v3.3.0-QQ9.2.10-debug
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Write build summary
        shell: bash
        run: |
          {
            echo "## QQ 防撤回 NT v3.3 构建成功"
            echo
            echo "- 文件：\`${{ steps.prepare.outputs.apk_name }}\`"
            echo "- SHA-256：\`${{ steps.prepare.outputs.apk_sha256 }}\`"
            echo "- 修复：主动语音转发菜单、设置数据入口、显式广播专属日志、前台加载提示"
            echo "- 单元测试：NT C2C、群聊和 InfoSync 撤回解析已通过"
            echo "- [点击下载构建产物](${{ steps.upload.outputs.artifact-url }})"
            echo
            echo "覆盖安装后，强制停止并重新打开 QQ。"
          } >> "$GITHUB_STEP_SUMMARY"
